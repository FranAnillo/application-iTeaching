spring.application.name=iTeaching 2.0

# ===== H2 In-Memory Database =====
spring.datasource.url=jdbc:h2:mem:iteaching;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=myuser
spring.datasource.password=secret

# ===== H2 Console (http://localhost:8080/h2-console) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Override MySQL dialect from application.properties with H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== Server =====
server.port=8081

# ===== JWT =====
jwt.secret=aVRlYWNoaW5nQXBwU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNg==
jwt.expiration=86400000

# ===== Disable Docker Compose auto-start =====
spring.docker.compose.enabled=false

# ===== Logging =====
logging.level.iteaching.app=DEBUG
logging.level.org.springframework.security=DEBUG
