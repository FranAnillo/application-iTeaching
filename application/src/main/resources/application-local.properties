spring.application.name=iTeaching 2.0

# ===== H2 In-Memory Database =====
# spring.datasource.url=jdbc:h2:mem:iteaching;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=myuser
# spring.datasource.password=secret

# ===== H2 Console (http://localhost:8080/h2-console) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Override MySQL dialect from application.properties with H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Neon con PostgreSQL (no guardar credenciales en repo)

#=========== un archivo específico de perfil no puede declarar qué perfil está activo, eso se hace en application.properties o con variables de entorno. Si quieres usar este archivo, asegúrate de activar el perfil "local" en application.properties o con env var SPRING_PROFILES_ACTIVE=local.
# spring.profiles.active=local
spring.datasource.url=${DB_URL:jdbc:postgresql://<POOLER_HOST>/<DBNAME>?sslmode=require&channelBinding=require}
spring.datasource.username=${DB_USERNAME:your_user}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari (valores recomendados para Neon)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:300000}

# ===== Server =====
server.port=8081

# ===== JWT =====
jwt.secret=aVRlYWNoaW5nQXBwU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNg==
jwt.expiration=86400000

# ===== Disable Docker Compose auto-start =====
spring.docker.compose.enabled=false

# ===== Logging =====
logging.level.iteaching.app=DEBUG
logging.level.org.springframework.security=DEBUG

logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
