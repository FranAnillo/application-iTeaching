spring.application.name=iTeaching 2.0

# ===== Database =====
# IMPORTANT: Override with env variables DB_URL, DB_USERNAME, DB_PASSWORD in production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/iteaching?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Server =====
server.port=8080
server.servlet.context-path=/

# ===== JWT =====
# IMPORTANT: Override jwt.secret with env variable JWT_SECRET in production
jwt.secret=${JWT_SECRET:aVRlYWNoaW5nQXBwU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNg==}
jwt.expiration=86400000

# ===== OAuth2 (Google example - configure with your credentials) =====
# spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
# spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Logging =====
logging.level.iteaching.app=DEBUG
logging.level.org.springframework.security=INFO
