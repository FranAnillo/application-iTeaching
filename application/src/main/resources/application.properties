spring.application.name=iTeaching 2.0

# --------------------------------------------------
# Default active profile
# Use the "local" profile automatically so that a built-in
# H2 database is used when running without external MySQL.
# Remove or override this property in production if you want
# to connect to a real database instead.
# --------------------------------------------------
spring.profiles.active=local

# ===== Database =====
# IMPORTANT: Override with env variables DB_URL, DB_USERNAME, DB_PASSWORD in production
# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/iteaching?sslmode=require}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hikari defaults (puedes sobrescribir con env vars)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:300000}

# ===== JPA / Hibernate =====
# Estaba en update, pero he utilizado create para crear las tablas automáticamente en postgreSQL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Server =====
server.port=8080
server.servlet.context-path=/

# ===== JWT =====
# IMPORTANT: Override jwt.secret with env variable JWT_SECRET in production
jwt.secret=${JWT_SECRET:aVRlYWNoaW5nQXBwU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNg==}
jwt.expiration=86400000

# ===== OAuth2 (Google example - configure with your credentials) =====
# spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
# spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Logging =====
logging.level.iteaching.app=DEBUG
logging.level.org.springframework.security=INFO

logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Disable Spring Boot Docker Compose integration (not needed here)
spring.docker.compose.enabled=false
