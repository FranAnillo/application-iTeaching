version: '3.8'
services:
  app:
    build: ./application
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: iteaching
      POSTGRES_USER: iteaching
      POSTGRES_PASSWORD: iteaching
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
